<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shard Partners — All-in-One Web3 Studio</title>
<meta name="description" content="Shard Partners — All-in-One Web3 Studio born at KAIST in 2021. Strategy, product, full-stack Web3 development and DeFi infrastructure from Seoul, proven on the global stage.">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Cpolygon%20points='16,2%2027,12%2016,30%205,12'%20fill='none'%20stroke='%232e63ff'%20stroke-width='2'/%3E%3C/svg%3E">
<link rel="stylesheet" href="style.css">
<noscript><style>.reveal{opacity:1;transform:none}.tab-panel{display:block!important}</style></noscript>
</head>
<body>
<div id="slot-nav"></div>
<div id="slot-hero"></div>


<div id="tab-about" class="tab-panel active">
  <div id="slot-story"></div>
  <div id="slot-practice"></div>
</div>

<div id="tab-team" class="tab-panel">
  <div id="slot-team"></div>
  <div id="slot-recognition"></div>
</div>

<div id="tab-portfolio" class="tab-panel">
  <div id="slot-portfolio"></div>
</div>

<div id="tab-contact" class="tab-panel">
  <div id="slot-contact"></div>
</div>

<div id="slot-footer"></div>
<script>
(function(){
  var sections=["nav","hero","story","practice","recognition","team","contact","footer","portfolio"];
  Promise.all(sections.map(function(s){
    return fetch("sections/"+s+".html",{cache:"no-cache"})
      .then(function(r){return r.text();})
      .then(function(html){var el=document.getElementById("slot-"+s);if(el)el.outerHTML=html;});
  })).then(function(){
    var sc=document.createElement("script");
    sc.src="app.js?v="+Date.now();
    document.body.appendChild(sc);
  });
})();
</script>
</body>
</html>
