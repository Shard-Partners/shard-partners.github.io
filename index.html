<html lang="en">
<head>

<link rel="icon" type="image/png" href="img/shard-logo-dark-navy.png">

<!-- Structured data: logo + bilingual name for Google -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Shard Partners",
  "alternateName": ["샤드파트너스", "Shard Partners Global Inc."],
  "url": "https://www.shardpartners.com",
  "logo": {
    "@type": "ImageObject",
    "url": "https://www.shardpartners.com/img/shard-logo-dark-navy.png",
    "width": 365,
    "height": 364
  },
  "description": "End-to-End Web3 Studio",
  "foundingDate": "2021",
  "foundingLocation": "Seoul, South Korea"
}
</script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Shard Partners",
  "alternateName": "샤드파트너스",
  "url": "https://www.shardpartners.com"
}
</script>

<!-- Open Graph / KakaoTalk / Facebook / LINE -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Shard Partners Global Inc.">
<meta property="og:title" content="Shard Partners Global Inc.">
<meta property="og:description" content="End-to-End Web3 Studio">

<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="Shard Partners Global Inc.">
<meta property="og:locale" content="en_US">

<!-- Twitter / X -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Shard Partners Global Inc.">
<meta name="twitter:description" content="End-to-End Web3 Studio">
<meta name="twitter:image" content="https://www.shardpartners.com/img/shard-bg.png">
<link rel="stylesheet" href="style.css">
<noscript><style>.reveal{opacity:1;transform:none}</style></noscript>
</head>
<body>
<div id="slot-nav"></div>
<div id="slot-hero"></div>
<div id="slot-story"></div>
<div id="slot-practice"></div>
<div id="slot-recognition"></div>
<div id="slot-team"></div>
<div id="slot-portfolio"></div>
<div id="slot-contact"></div>
<div id="slot-video"></div>
<div id="slot-footer"></div>
<script>
(function(){
  var sections=["nav","hero","story","practice","recognition","team","video","contact","footer","portfolio"];
  Promise.all(sections.map(function(s){
    return fetch("sections/"+s+".html",{cache:"no-cache"})
      .then(function(r){return r.text();})
      .then(function(html){var el=document.getElementById("slot-"+s);if(el)el.outerHTML=html;});
  })).then(function(){
    var sc=document.createElement("script");
    sc.src="app.js?v="+Date.now();
    document.body.appendChild(sc);
  });
})();
</script>
</body>
</html>
